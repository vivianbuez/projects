<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Todo Item Card</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <article
    data-testid="test-todo-card"
    aria-labelledby="todo-title-id"
    aria-describedby="todo-desc-id"
  >

    <!-- ── Header: Checkbox + Title ── -->
    <div class="card-header">

      <div class="checkbox-wrap">
        <input
          type="checkbox"
          id="complete-toggle"
          data-testid="test-todo-complete-toggle"
          aria-label="Mark task as complete"
        />
      </div>

      <div class="title-wrap">
        <label for="complete-toggle" style="display:block; cursor:pointer;">
          <h2 id="todo-title-id" data-testid="test-todo-title">
            Finish Frontend Task
          </h2>
        </label>
      </div>

    </div>

    <!-- ── Description ── -->
    <p id="todo-desc-id" data-testid="test-todo-description">
      Build a clean, accessible, and testable to-do card component.
    </p>

    <!-- ── Priority + Status ── -->
    <div class="meta-row">

      <span
        data-testid="test-todo-priority"
        class="badge priority-high"
        aria-label="Priority: High"
      >
        <span class="dot" aria-hidden="true"></span>High
      </span>

      <span
        id="status-badge"
        data-testid="test-todo-status"
        class="badge status-pending"
        aria-label="Status: Pending"
      >
        <span class="dot" aria-hidden="true"></span>Pending
      </span>

    </div>

    <!-- ── Due Date + Time Remaining ── -->
    <div class="time-row">

      <time
        data-testid="test-todo-due-date"
        class="due-date-wrap"
        datetime="2026-03-01T18:00:00Z"
        aria-label="Due date: March 1, 2026"
      >
        <!-- Calendar SVG icon -->
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <rect x="3" y="4" width="18" height="18" rx="2"/>
          <line x1="16" y1="2" x2="16" y2="6"/>
          <line x1="8" y1="2" x2="8" y2="6"/>
          <line x1="3" y1="10" x2="21" y2="10"/>
        </svg>
        Due March 1, 2026
      </time>

      <span
        id="time-remaining"
        data-testid="test-todo-time-remaining"
        class="time-remaining-badge"
        aria-live="polite"
        aria-label="Time remaining"
      ></span>

    </div>

    <hr class="divider" />

    <!-- ── Tags ── -->
    <ul
      data-testid="test-todo-tags"
      class="tags-list"
      role="list"
      aria-label="Task tags"
    >
      <li role="listitem"><span class="tag" data-testid="test-todo-tag-work">Work</span></li>
      <li role="listitem"><span class="tag" data-testid="test-todo-tag-urgent">Urgent</span></li>
      <li role="listitem"><span class="tag">Design</span></li>
    </ul>

    <!-- ── Actions ── -->
    <div class="actions">

      <button
        data-testid="test-todo-edit-button"
        aria-label="Edit task"
        id="edit-btn"
      >
        <!-- Pencil icon -->
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
          <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
        </svg>
        Edit
      </button>

      <button
        data-testid="test-todo-delete-button"
        class="btn-delete"
        aria-label="Delete task"
        id="delete-btn"
      >
        <!-- Trash icon -->
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <polyline points="3 6 5 6 21 6"/>
          <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/>
          <path d="M10 11v6"/>
          <path d="M14 11v6"/>
          <path d="M9 6V4h6v2"/>
        </svg>
        Delete
      </button>

    </div>

  </article>

  <script src="app.js"></script>
</body>
</html>
