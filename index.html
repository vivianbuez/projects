<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Testable To-do Card</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background:linear-gradient(135deg, #667eea, #764ba2);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
    }

    article {
      background: rgb(225, 192, 225);
      padding: 20px;
      border-radius: 12px;
      width: 100%;
      max-width: 450px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    }

    h2 {
      margin: 0;
    }

    .completed h2 {
      text-decoration: line-through;
      opacity: 0.6;
    }

    .badge {
      display: inline-block;
      padding: 6px 10px;
      border-radius: 20px;
      font-size: 12px;
      margin-top: 5px;
    }

    .high { background: rgb(230, 110, 35); color: white; }
    .medium { background: orange; color: white; }
    .low { background: green; color: white; }

    .status {
      font-weight: bold;
      margin-top: 5px;
    }

    .tags {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      margin-top: 10px;
    }

    .tag {
      background: #eee;
      padding: 5px 10px;
      border-radius: 15px;
      font-size: 12px;
    }

    .actions {
      margin-top: 15px;
      display: flex;
      gap: 10px;
    }

    button {
      padding: 8px 12px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }

    button:focus {
      outline: 2px solid rgb(101, 63, 250);
    }

    .edit { background: #9d2f03; color: white; }
    .delete { background: crimson; color: white; }

    .time {
      margin-top: 5px;
      font-size: 14px;
      color: #555;
    }
  </style>
</head>
<body>

<article data-testid="test-todo-card" id="card">

  <!-- Checkbox -->
  <label>
    <input type="checkbox" data-testid="test-todo-complete-toggle" id="checkbox">
    Mark as complete
  </label>

  <!-- Title -->
  <h2 data-testid="test-todo-title">Finish Frontend Project</h2>

  <!-- Description -->
  <p data-testid="test-todo-description">
    Complete the to-do card UI and ensure all test IDs are correct.
  </p>

  <!-- Priority -->
  <span 
    data-testid="test-todo-priority" 
    class="badge high"
    aria-label="High priority">
    High
  </span>

  <!-- Status -->
  <div 
    data-testid="test-todo-status" 
    class="status"
    id="status">
    Pending
  </div>

  <!-- Due Date -->
  <time 
    data-testid="test-todo-due-date"
    datetime="2026-03-01T18:00:00Z"
    id="dueDate">
    Due March 1, 2026
  </time>

  <!-- Time Remaining -->
  <div 
    data-testid="test-todo-time-remaining" 
    class="time"
    id="timeRemaining">
  </div>

  <!-- Tags -->
  <ul class="tags" data-testid="test-todo-tags">
    <li class="tag" data-testid="test-todo-tag-work">work</li>
    <li class="tag" data-testid="test-todo-tag-urgent">urgent</li>
    <li class="tag">design</li>
  </ul>

  <!-- Buttons -->
  <div class="actions">
    <button 
      data-testid="test-todo-edit-button" 
      class="edit"
      aria-label="Edit task">
      Edit
    </button>

    <button 
      data-testid="test-todo-delete-button" 
      class="delete"
      aria-label="Delete task">
      Delete
    </button>
  </div>

</article>

<script>
  const dueDate = new Date("2026-03-01T18:00:00Z");
  const timeEl = document.getElementById("timeRemaining");

  function updateTime() {
    const now = new Date();
    const diff = dueDate - now;

    const minutes = Math.floor(diff / (1000 * 60));
    const hours = Math.floor(diff / (1000 * 60 * 60));
    const days = Math.floor(diff / (1000 * 60 * 60 * 24));

    if (diff > 0) {
      if (days > 0) {
        timeEl.textContent = `Due in ${days} day(s)`;
      } else if (hours > 0) {
        timeEl.textContent = `Due in ${hours} hour(s)`;
      } else if (minutes > 0) {
        timeEl.textContent = `Due in ${minutes} minute(s)`;
      } else {
        timeEl.textContent = "Due now!";
      }
    } else {
      const overdueHours = Math.abs(hours);
      timeEl.textContent = `Overdue by ${overdueHours} hour(s)`;
    }
  }

  updateTime();
  setInterval(updateTime, 60000);

  // Checkbox behavior
  const checkbox = document.getElementById("checkbox");
  const card = document.getElementById("card");
  const status = document.getElementById("status");

  checkbox.addEventListener("change", () => {
    if (checkbox.checked) {
      card.classList.add("completed");
      status.textContent = "Done";
    } else {
      card.classList.remove("completed");
      status.textContent = "Pending";
    }
  });

  // Buttons
  document.querySelector(".edit").onclick = () => {
    console.log("edit clicked");
  };

  document.querySelector(".delete").onclick = () => {
    alert("Delete clicked");
  };
</script>

</body>
</html>
